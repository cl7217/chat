<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Chat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
    #top { padding: 12px; background: #2b2f3a; color: #fff; display:flex; justify-content:space-between; align-items:center; }
    #chat { flex: 1; padding: 16px; overflow-y: auto; background: #f6f6f6; }
    .message { margin-bottom: 12px; padding:8px; border-radius:6px; background: #fff; box-shadow: 0 1px 0 rgba(0,0,0,0.04); }
    .meta { font-size: 0.85rem; color: #555; margin-bottom:6px; }
    #send { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #ddd; background: white; }
    #message { flex: 1; padding: 10px; font-size: 1rem; }
    #send button { padding: 10px 16px; font-size: 1rem; }
    #users { padding: 8px 12px; border-top: 1px solid #ddd; background: #fafafa; font-size: 0.9rem; }
    #loginOverlay { position: fixed; inset: 0; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.5); }
    #loginBox { background: #fff; padding: 20px; border-radius:8px; width:320px; box-shadow: 0 6px 30px rgba(0,0,0,0.2); }
    #loginBox input { width:100%; padding:10px; margin-bottom:10px; }
    #system { font-size:0.85rem; color:#333; margin-bottom:8px; }
  </style>
</head>
<body>
  <div id="top">
    <div>Realtime Chat</div>
    <div id="status">Not connected</div>
  </div>
  <div id="chat"></div>

  <div id="send">
    <input id="message" type="text" placeholder="Type your message…" autocomplete="off" />
    <button id="sendBtn">Send</button>
  </div>
  <div id="users">Connected users: <span id="userCount">0</span></div>

  <div id="loginOverlay">
    <div id="loginBox">
      <div id="system">Enter a username to join the chat</div>
      <input id="usernameInput" placeholder="Your name" />
      <button id="joinBtn">Join</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // Elements
    const chat = document.getElementById('chat');
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('sendBtn');
    const userCount = document.getElementById('userCount');
    const status = document.getElementById('status');

    const loginOverlay = document.getElementById('loginOverlay');
    const usernameInput = document.getElementById('usernameInput');
    const joinBtn = document.getElementById('joinBtn');

    let socket = null;
    let currentUser = null;
    const connectedUsers = new Map(); // id -> username

    function setStatus(txt) { status.textContent = txt; }

    function appendMessage(message, isSystem = false) {
      const node = document.createElement('div');
      node.className = 'message';
      const user = message.user || message.sender || { username: 'anon', id: 'anon' };
      const time = message.createdAt || message.timestamp || Date.now();
      node.innerHTML = `
        <div class="meta"><strong>${escapeHtml(user.username || user.name || user.id)}</strong> · ${new Date(time).toLocaleTimeString()}</div>
        <div>${escapeHtml(message.text || message.body || message.msg || '')}</div>
      `;
      if (isSystem) node.style.opacity = '0.75';
      chat.appendChild(node);
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, function(s) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[s];
      });
    }

    function updateUserCount() {
      userCount.textContent = connectedUsers.size;
    }

    async function joinChat(username) {
      // call backend login to get an id
      try {
        const res = await fetch('/api/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error || 'Login failed');
        currentUser = data.user;
      } catch (err) {
        alert('Login error: ' + err.message);
        return;
      }

      // connect socket
      socket = io();

      socket.on('connect', () => {
        setStatus('Connected');
        // send join event with user
        socket.emit('join', currentUser);
        // add self to connected users
        connectedUsers.set(currentUser.id, currentUser.username);
        updateUserCount();
      });

      // initial messages history
      socket.on('messages', (messages) => {
        chat.innerHTML = '';
        messages.forEach(m => appendMessage(m));
      });

      // single new message
      socket.on('message', (m) => {
        appendMessage(m);
      });

      socket.on('user-joined', (user) => {
        if (!user || !user.id) return;
        connectedUsers.set(user.id, user.username || user.name || '');
        updateUserCount();
        appendMessage({ user: { username: 'System' }, text: `${user.username} joined the chat` }, true);
      });

      socket.on('user-left', (user) => {
        if (!user || !user.id) return;
        connectedUsers.delete(user.id);
        updateUserCount();
        appendMessage({ user: { username: 'System' }, text: `${user.username} left the chat` }, true);
      });

      socket.on('disconnect', () => setStatus('Disconnected'));

      loginOverlay.style.display = 'none';
      messageInput.focus();

      // load any existing messages also from REST endpoint as fallback
      try {
        const resp = await fetch('/api/messages');
        if (resp.ok) {
          const json = await resp.json();
          if (Array.isArray(json.messages)) {
            // only append messages not already present
            json.messages.forEach(m => appendMessage(m));
          }
        }
      } catch (e) {
        // ignore
      }
    }

    // send message
    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if (!text || !socket) return;
      socket.emit('chat-message', { text });
      messageInput.value = '';
      messageInput.focus();
    });

    messageInput.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') sendBtn.click();
    });

    // join UI
    joinBtn.addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (!name) return alert('Please enter a name');
      joinChat(name);
    });

    usernameInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') joinBtn.click(); });

    // if you want to auto-fill username (optional)
    usernameInput.value = localStorage.getItem('chat_username') || '';
    joinBtn.addEventListener('click', () => {
      if (usernameInput.value) localStorage.setItem('chat_username', usernameInput.value.trim());
    });
  </script>
</body>
</html>
